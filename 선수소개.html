        body {

            margin: 0;
            padding: 20px 0;
            place-items: center;
        }

        .slide-container {
            align-items: flex-start;
            background-color: #1c1e23;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            font-family: 'Noto Sans KR', 'Poppins', sans-serif;
            height: 720px;
            justify-content: flex-start;
            overflow: hidden;
            padding: 60px 80px;
            position: relative;
            width: 1280px;
        }

        .title-layout {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
        }
        .title-layout h1 { color: #fff; font-size: 80px; margin: 0; font-family: 'Poppins', sans-serif; letter-spacing: 2px; }
        .title-layout h1 span { color: #f19938; }
        .title-layout p { color: #9aa0a6; font-size: 24px; margin-top: 20px; }

        .slide-container h2 { color: #ffffff; font-weight: 800; font-family: 'Poppins', 'Noto Sans KR', sans-serif; margin: 0; }
        .slide-container p { color: #9aa0a6; font-family: 'Noto Sans KR', sans-serif; margin: 0; }

        .slide-header { display: flex; align-items: center; margin-bottom: 50px; }
        .header-bar { width: 8px; height: 40px; background-color: #f19938; margin-right: 20px; border-radius: 4px; }
        .slide-title { font-size: 42px; text-transform: uppercase; letter-spacing: 1px; }

        .content-area { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; width: 100%; height: 100%; }
        .section-title { font-size: 26px; font-weight: 700; color: #f19938; margin-bottom: 25px; display: flex; align-items: center; }
        .section-title i { margin-right: 12px; font-size: 24px; }

        .radar-box {
            background-color: #242831; border-radius: 12px; height: 440px;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); position: relative;
        }
        .radar-chart { width: 100%; height: 100%; overflow: visible; }
        .radar-bg-line { fill: none; stroke: #3a3f47; stroke-width: 1.5; stroke-dasharray: 3 3; }
        .radar-axis { stroke: #3a3f47; stroke-width: 1.5; }
        .radar-data-fill { fill: rgba(241, 153, 56, 0.25); stroke: #f19938; stroke-width: 3; }
        .radar-data-point { fill: #ffffff; stroke: #f19938; stroke-width: 2.5; }
        .radar-label { fill: #d1d5db; font-size: 15px; font-weight: 500; font-family: 'Noto Sans KR', sans-serif; }
        .radar-label.highlight { fill: #f19938; font-weight: 700; }

        .champ-cards-container { display: flex; flex-direction: column; gap: 20px; }
        .champ-card {
            display: flex; align-items: center; background-color: #242831;
            border-radius: 12px; padding: 18px 30px; border-left: 6px solid #f19938;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .champ-card .rank {
            font-size: 38px; font-weight: 900; color: #dcb651; margin-right: 35px;
            width: 30px; text-align: center; font-family: 'Poppins', sans-serif;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .champ-card .rank.sub { color: #78828c; text-shadow: none; }
        .champ-card .image-wrapper {
            width: 80px; height: 80px; border-radius: 50%; overflow: hidden;
            margin-right: 25px; border: 3px solid #f19938; flex-shrink: 0; background-color: #1c1e23;
            display: flex; justify-content: center; align-items: center;
        }
        .champ-card .image-wrapper img { width: 100%; height: 100%; object-fit: cover; object-position: center top; }
        .champ-card .image-wrapper i { font-size: 40px; color: #f19938; }
        .champ-card .champ-info h4 { font-size: 26px; font-weight: 700; color: #ffffff; margin: 0 0 6px 0; letter-spacing: 0.5px; }
        .champ-card .champ-info p { font-size: 16px; color: #9aa0a6; font-weight: 400; margin: 0; }

    function getPoint(value, angleDegree) {
        const radius = (value / 10) * 130; // 10점 만점일때 반지름 130
        const angleRad = (angleDegree - 90) * (Math.PI / 180);
        return {
            x: 200 + radius * Math.cos(angleRad),
            y: 200 + radius * Math.sin(angleRad)
        };
    }

    // 각도 매핑: 0:오더, 1:게임이해도, 2:피지컬, 3:실력보정치, 4:내전평가, 5:가용캐릭폭
    const angles = [0, 60, 120, 180, 240, 300];

    // 2. 선수별 슬라이드 생성 루프
    playerData.forEach(player => {
        // 배경 그리드 계산
        let gridsHTML = '';
        for (let r = 2; r <= 10; r += 2) {
            let pts = angles.map(a => {
                let p = getPoint(r, a);
                return `${p.x},${p.y}`;
            }).join(' ');
            gridsHTML += `<polygon class="radar-bg-line" points="${pts}" />`;
        }

        // 축 선 계산
        let axesHTML = angles.map(a => {
            let p = getPoint(10, a);
            return `<line class="radar-axis" x1="200" y1="200" x2="${p.x}" y2="${p.y}" />`;
        }).join('');

        // 선수 데이터 계산
        let dataPts = player.stats.map((val, idx) => getPoint(val, angles[idx]));
        let polygonPoints = dataPts.map(p => `${p.x},${p.y}`).join(' ');
        
        let dataPointsHTML = dataPts.map(p => 
            `<circle class="radar-data-point" cx="${p.x}" cy="${p.y}" r="5" />`
        ).join('');

        // 텍스트 라벨링 (절대 사라지지 않도록 직접 좌표 배정)
        const labelsHTML = `
            <text class="radar-label" x="200" y="50" text-anchor="middle">오더 능력 (${player.stats[0]})</text>
            <text class="radar-label" x="325" y="135" text-anchor="start" dominant-baseline="middle">게임 이해도 (${player.stats[1]})</text>
            <text class="radar-label" x="325" y="265" text-anchor="start" dominant-baseline="middle">피지컬 (${player.stats[2]})</text>
            <text class="radar-label" x="200" y="350" text-anchor="middle">실력 보정치 (${player.stats[3]})</text>
            <text class="radar-label" x="75" y="265" text-anchor="end" dominant-baseline="middle">내전 평가 (${player.stats[4]})</text>
            <text class="radar-label" x="75" y="135" text-anchor="end" dominant-baseline="middle">가용 캐릭 폭 (${player.stats[5]})</text>
        `;

        // 챔피언 카드 HTML 생성 (전부 기본 아이콘 표시로 수정)
        let champsHTML = player.champs.map((champ, idx) => `
            <div class="champ-card">
                <div class="rank ${idx > 0 ? 'sub' : ''}">${idx + 1}</div>
                <div class="image-wrapper">
                    <i class="fa-solid fa-user-ninja"></i>
                </div>
                <div class="champ-info">
                    <h4>${champ.name}</h4>
                    <p>${champ.type}</p>
                </div>
            </div>
        `).join('');

        // 슬라이드 조립
        const slideHTML = `
            <div class="slide-container">
                <div class="slide-header">
                    <div class="header-bar"></div>
                    <h2 class="slide-title">${player.name} - PLAYER STATS & CHAMPIONS</h2>
                </div>
                <div class="content-area">
                    <div>
                        <div class="section-title">스탯 데이터 (Radar Chart)</div>
                        <div class="radar-box">
                            <svg class="radar-chart" viewBox="0 0 400 400">
                                ${gridsHTML}
                                ${axesHTML}
                                <polygon class="radar-data-fill" points="${polygonPoints}" />
                                ${dataPointsHTML}
                                ${labelsHTML}
                            </svg>
                        </div>
                    </div>
                    <div>
                        <div class="section-title"><i class="fa-solid fa-medal"></i>자신있는 챔피언 TOP 3</div>
                        <div class="champ-cards-container">
                            ${champsHTML}
                        </div>
                    </div>
                </div>
            </div>
        `;
        
        app.innerHTML += slideHTML;
    });
</script>
</body>
</html>
